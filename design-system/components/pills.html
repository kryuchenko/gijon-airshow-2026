<!-- @dsCard name="Pills and language switch" group="Components" subtitle="Hero pill, language switcher with active state" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Pills and language switch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap">
<style>
  :root {
    color-scheme: light dark;
    --blue: light-dark(#0066FF, #5C95FF);
    --yellow: #F7D417;
    --ink: light-dark(#0C1B33, #E2E8F2);
    --muted: light-dark(#46586E, #9FB0C6);
    --bg: light-dark(#FFFFFF, #0F1522);
    --card: light-dark(#FFFFFF, #1A2333);
    --border: light-dark(rgba(12,27,51,0.14), rgba(226,232,242,0.16));
    --accent-muted: light-dark(rgba(0,102,255,0.1), rgba(92,149,255,0.18));
    --on-accent: light-dark(#FFFFFF, #0A1730);
    --good-bg: light-dark(#24BB5E33, #24BB5E33); --good-ink: light-dark(#09441F, #A5F690);
    --bad-bg: light-dark(#E3193B33, #E3193B33); --bad-ink: light-dark(#7B0210, #FFB2B8);
    --side-bg: light-dark(#E2A40033, #E2A40033); --side-ink: light-dark(#753F07, #FBCE03);
    --dusk-bg: light-dark(#7952FF33, #7952FF33); --dusk-ink: light-dark(#3E0697, #B3B0FE);
    --r-inner: 8px; --r-el: 12px; --r-cont: 16px;
    --shadow: 0px 1px 1px rgba(0,0,0,0.1), 0px 2px 8px rgba(0,0,0,0.1);
  }
  body { margin: 0; padding: 20px; font-family: Figtree, system-ui, sans-serif;
         color: var(--ink); background: var(--bg); line-height: 1.5; }
</style>
</head>
<body>
<style>
  .pill { display: inline-block; padding: 6px 16px; border: 1px solid var(--border);
          border-radius: 9999px; font-size: 14px; font-weight: 500; color: var(--muted); background: var(--card); }
  .pill strong { color: var(--blue); font-weight: 600; }
  .lang { display: flex; gap: 4px; margin-top: 16px; }
  .lang a { padding: 4px 14px; border-radius: 9999px; border: 1px solid var(--border);
            color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 500; }
  .lang a.active { background: var(--blue); color: var(--on-accent); border-color: var(--blue); }
</style>
<span class="pill">24&ndash;26 July 2026 &middot; <strong>Playa de San Lorenzo, Gijón</strong></span>
<nav class="lang"><a href="#" class="active">ES</a><a href="#">RU</a><a href="#">EN</a></nav>
</body></html>
