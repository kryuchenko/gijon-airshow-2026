<!-- @dsCard name="Asturias palette" group="Colors" subtitle="Blue Pantone 829, yellow Pantone 109, white base" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Asturias palette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap">
<style>
  :root {
    color-scheme: light dark;
    --blue: light-dark(#0066FF, #5C95FF);
    --yellow: #F7D417;
    --ink: light-dark(#0C1B33, #E2E8F2);
    --muted: light-dark(#46586E, #9FB0C6);
    --bg: light-dark(#FFFFFF, #0F1522);
    --card: light-dark(#FFFFFF, #1A2333);
    --border: light-dark(rgba(12,27,51,0.14), rgba(226,232,242,0.16));
    --accent-muted: light-dark(rgba(0,102,255,0.1), rgba(92,149,255,0.18));
    --on-accent: light-dark(#FFFFFF, #0A1730);
    --good-bg: light-dark(#24BB5E33, #24BB5E33); --good-ink: light-dark(#09441F, #A5F690);
    --bad-bg: light-dark(#E3193B33, #E3193B33); --bad-ink: light-dark(#7B0210, #FFB2B8);
    --side-bg: light-dark(#E2A40033, #E2A40033); --side-ink: light-dark(#753F07, #FBCE03);
    --dusk-bg: light-dark(#7952FF33, #7952FF33); --dusk-ink: light-dark(#3E0697, #B3B0FE);
    --r-inner: 8px; --r-el: 12px; --r-cont: 16px;
    --shadow: 0px 1px 1px rgba(0,0,0,0.1), 0px 2px 8px rgba(0,0,0,0.1);
  }
  body { margin: 0; padding: 20px; font-family: Figtree, system-ui, sans-serif;
         color: var(--ink); background: var(--bg); line-height: 1.5; }
</style>
</head>
<body>
<style>
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 130px; border: 1px solid var(--border); border-radius: var(--r-el); overflow: hidden; }
  .sw .c { height: 64px; }
  .sw .l { padding: 8px 10px; font-size: 12.5px; }
  .sw .l b { display: block; font-size: 13px; }
</style>
<div class="row">
  <div class="sw"><div class="c" style="background:#0066FF"></div><div class="l"><b>Asturias blue</b>Pantone 829 · #0066FF</div></div>
  <div class="sw"><div class="c" style="background:#F7D417"></div><div class="l"><b>Asturias yellow</b>Pantone 109 · #F7D417</div></div>
  <div class="sw"><div class="c" style="background:#FFFFFF;border-bottom:1px solid var(--border)"></div><div class="l"><b>Base white</b>#FFFFFF</div></div>
  <div class="sw"><div class="c" style="background:#0C1B33"></div><div class="l"><b>Ink</b>#0C1B33</div></div>
  <div class="sw"><div class="c" style="background:#46586E"></div><div class="l"><b>Secondary</b>#46586E</div></div>
  <div class="sw"><div class="c" style="background:#5C95FF"></div><div class="l"><b>Blue (dark mode)</b>#5C95FF</div></div>
</div>
</body></html>
